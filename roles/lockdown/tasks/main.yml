- name: Disallow password authentication
  lineinfile: dest=/etc/ssh/sshd_config
              regexp="^PasswordAuthentication"
              line="PasswordAuthentication no"
              state=present
  notify: Restart ssh

- name: Ensure deploy has a .ssh directory
  file:
    path: /home/deploy/.ssh
    state: directory
    owner: deploy
    group: deploy
    mode: '0700'

- name: Read root authorized_keys
  slurp:
    src: /root/.ssh/authorized_keys
  register: root_authorized_keys
  ignore_errors: true

- name: Copy root authorized keys to deploy user
  authorized_key:
    user: deploy
    key: "{{ root_authorized_keys.content | b64decode }}"
    state: present
  when: root_authorized_keys is succeeded

- name: Verify deploy user SSH access
  ansible.builtin.command: >
    ssh -o BatchMode=yes
        -o StrictHostKeyChecking=no
        -o ConnectTimeout=5
        -o PasswordAuthentication=no
        deploy@{{ inventory_hostname }}
        echo deploy-ok
  delegate_to: localhost
  become: false
  register: deploy_ssh_test
  ignore_errors: true
  changed_when: false

- name: Disallow root SSH access
  lineinfile: dest=/etc/ssh/sshd_config
              regexp="^PermitRootLogin"
              line="PermitRootLogin no"
              state=present
  notify: Restart ssh
  when: deploy_ssh_test.rc == 0
